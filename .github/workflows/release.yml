name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes --repo "${{ github.repository }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: macos-13
            target: darwin-x64
          - os: ubuntu-latest
            target: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev cmake

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install curl

      - name: Build QuickJS binary
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            export EXTRA_CMAKE_OPTS="-DCMAKE_PREFIX_PATH=$(brew --prefix curl)"
          fi
          bash scripts/build-binary.sh

      - name: Stage binary
        run: cp bin/tqs bin/tqs-${{ matrix.target }}

      - name: Upload to release
        run: gh release upload ${{ github.ref_name }} bin/tqs-${{ matrix.target }} --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --dir /tmp/release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA256 hashes
        run: |
          echo "SHA_DARWIN_ARM64=$(sha256sum /tmp/release/tqs-darwin-arm64 | awk '{print $1}')" >> $GITHUB_ENV
          echo "SHA_DARWIN_X64=$(sha256sum /tmp/release/tqs-darwin-x64 | awk '{print $1}')" >> $GITHUB_ENV
          echo "SHA_LINUX_X64=$(sha256sum /tmp/release/tqs-linux-x64 | awk '{print $1}')" >> $GITHUB_ENV

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: yowainwright/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"
          cd homebrew-tap
          sed -i "s/  version \".*\"/  version \"$VERSION_NUM\"/" Formula/tqs.rb
          sed -i "/tqs-darwin-arm64\"/{n;s/sha256 \"[^\"]*\"/sha256 \"$SHA_DARWIN_ARM64\"/}" Formula/tqs.rb
          sed -i "/tqs-darwin-x64\"/{n;s/sha256 \"[^\"]*\"/sha256 \"$SHA_DARWIN_X64\"/}" Formula/tqs.rb
          sed -i "/tqs-linux-x64\"/{n;s/sha256 \"[^\"]*\"/sha256 \"$SHA_LINUX_X64\"/}" Formula/tqs.rb

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tqs.rb
          git diff --cached --quiet || git commit -m "chore: update tqs to ${{ github.ref_name }}"
          git push

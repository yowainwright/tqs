name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: macos-13
            target: darwin-x64
          - os: ubuntu-latest
            target: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev cmake

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install curl

      - name: Build QuickJS binary
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            export EXTRA_CMAKE_OPTS="-DCMAKE_PREFIX_PATH=$(brew --prefix curl)"
          fi
          bash scripts/build-binary.sh

      - name: Stage binary
        run: cp bin/tqs bin/tqs-${{ matrix.target }}

      - name: Upload to release
        run: gh release upload ${{ github.ref_name }} bin/tqs-${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

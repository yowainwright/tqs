services:
  tqs-test:
    build:
      context: ../../
      dockerfile: tests/e2e/Dockerfile
    volumes:
      - ./test-scripts:/test-scripts
    working_dir: /test-scripts
    networks:
      - test-network
    depends_on:
      - httpbin

  httpbin:
    image: kennethreitz/httpbin
    networks:
      - test-network

networks:
  test-network:
    driver: bridge

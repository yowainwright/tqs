version: '3.8'

services:
  tqs-test:
    build:
      context: ../../
      dockerfile: tests/e2e/Dockerfile
    volumes:
      - ./test-scripts:/test-scripts:ro
    working_dir: /test-scripts
    command: /app/bin/tqs --help
    networks:
      - test-network

  # HTTP test service for testing maybefetch
  httpbin:
    image: kennethreitz/httpbin
    ports:
      - "8080:80"
    networks:
      - test-network

networks:
  test-network:
    driver: bridge